<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%2300aed9'/><stop offset='100%25' stop-color='%230090b3'/></linearGradient></defs><rect rx='22' width='100' height='100' fill='%231b3a5c'/><text x='50' y='68' font-size='48' text-anchor='middle' fill='url(%23g)' font-family='system-ui' font-weight='800'>C</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1b3a5c" />
    <meta name="description" content="Carvana - Buy your next car online. AI-powered vehicle marketplace with instant financing and free delivery." />
    <title>Carvana - Buy Your Next Car Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      /* Inline critical CSS for instant loading */
      body { margin: 0; background: #f9fafb; font-family: 'Inter', system-ui, sans-serif; }
      #root-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 20px;
        background: #f9fafb;
      }
      #root-loader .logo {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #00aed9, #0090b3);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse-logo 1.5s ease-in-out infinite;
        box-shadow: 0 8px 24px rgba(0, 174, 217, 0.25);
      }
      #root-loader .logo svg { width: 24px; height: 24px; }
      #root-loader .dots { display: flex; gap: 6px; }
      #root-loader .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #00aed9;
        animation: bounce-dot 0.6s ease-in-out infinite alternate;
      }
      #root-loader .dot:nth-child(2) { animation-delay: 0.15s; }
      #root-loader .dot:nth-child(3) { animation-delay: 0.3s; }
      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes bounce-dot {
        from { transform: translateY(0); opacity: 0.4; }
        to { transform: translateY(-6px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-loader">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" />
            <circle cx="7" cy="17" r="2" />
            <circle cx="17" cy="17" r="2" />
          </svg>
        </div>
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
